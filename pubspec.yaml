name: translite
description: Offline English-Indonesian translator with voice support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  tflite_flutter: ^0.11.0
  speech_to_text: ^6.6.0
  flutter_tts: ^4.0.2
  path_provider: ^2.1.2
  dio: ^5.4.0
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/models/
